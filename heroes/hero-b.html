<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hero B</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../home/home.css">
<link rel="stylesheet" href="../home/hero-variations.css">
<style>body{background:var(--navy)}</style></head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><symbol id="i-sparkle" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 5.4L19 9l-5.2 1.6L12 16l-1.8-5.4L5 9l5.2-1.6z"/></symbol></svg>
<div class="hero-frame">
  <header class="site-header">
    <div class="wrap header-row">
      <a class="brand" href="#"><svg class="mark" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="19.5" fill="#141414"/><rect x="12.5" y="15.5" width="23" height="19" rx="9" fill="#2E6FC9"/><path d="M17 21.5c1.4-2.7 3.8-4.3 6.7-4.7" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><circle cx="24" cy="24" r="22.2" stroke="#2E6FC9" stroke-opacity=".35" stroke-width="1.4"/></svg><span class="wordmark"><span class="wm-main">STARNAUTS</span><span class="wm-sub">STREAMING SKILL TRAINING</span></span></a>
      <nav class="nav"><a href="#">에이전트</a><a href="#">강의</a><a href="#">도구</a><a href="#">콘텐츠</a></nav>
      <div class="header-cta"><a class="link-login" href="#">로그인</a><a class="btn btn--primary btn--sm" href="#">무료로 시작</a></div>
    </div>
  </header>
  <section class="hero hero--center">
    <div class="neb"></div><div class="stars" data-stars></div>
    <div class="portal" aria-hidden="true">
      <div class="ring r1"></div><div class="ring r2 spin spin--slow"><span class="sat" style="top:-7px;left:calc(50% - 7px)"></span></div>
      <div class="ring r3 spin spin--rev"><span class="sat" style="bottom:-7px;left:calc(50% - 7px);background:#fff"></span></div><div class="ring r4"></div>
      <div class="planet"></div>
    </div>
    <div class="wrap hero-inner">
      <svg class="helmet-top" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="19.5" fill="#fff"/><rect x="12.5" y="15.5" width="23" height="19" rx="9" fill="#2E6FC9"/><path d="M17 21.5c1.4-2.7 3.8-4.3 6.7-4.7" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
      <span class="hero-badge"><svg width="13" height="13"><use href="#i-sparkle"/></svg> Streaming Skill Training System</span>
      <h1>당신이 별이 될 수 있도록 —<br><span class="em">스트리머의 첫 송출</span>부터.</h1>
      <p class="lead">촬영·보컬·댄스·AI 음원까지, 현업 스트리머가 직접 가르치는 실전 커리큘럼. 언젠가 우주에서 방송하는 날까지 함께합니다.</p>
      <div class="hero-actions"><a class="btn btn--primary btn--lg" href="#">무료로 시작하기</a><a class="btn btn--ghost-dark btn--lg" href="#">강의 둘러보기</a></div>
      <div class="hero-stats"><div><div class="num">1,200+</div><div class="lab">누적 수강생</div></div><div class="sep"></div><div><div class="num">50+</div><div class="lab">현업 강사</div></div><div class="sep"></div><div><div class="num">4.9</div><div class="lab">평균 만족도</div></div></div>
    </div>
  </section>
</div>
<script>
(function(){var h=document.querySelector('[data-stars]');if(!h)return;var s='';for(var i=0;i<90;i++){var x=Math.random()*100,y=Math.random()*100,z=Math.random()*2+.6,o=Math.random()*.7+.25;s+='<span style="position:absolute;left:'+x+'%;top:'+y+'%;width:'+z+'px;height:'+z+'px;border-radius:50%;background:#fff;opacity:'+o+'"></span>';}h.innerHTML=s;})();
</script>
</body></html>
